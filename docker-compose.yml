services:
  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      DB_PATH: /data/workshop.db
      PORT: 3000
    volumes:
      - db-data:/data
    restart: unless-stopped

  client:
    build:
      context: ./client
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3000/api
    ports:
      - "3001:3001"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  db-data:
